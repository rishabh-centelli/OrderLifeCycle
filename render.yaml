services:
  - type: web
    name: order-lifecycle-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m alembic upgrade head"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: RATE_LIMIT
        value: 100/minute
      - key: LOG_LEVEL
        value: INFO
